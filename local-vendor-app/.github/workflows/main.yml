name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        working-directory: local-vendor-app
        run: npm install

      - name: Run ESLint on backend
        working-directory: local-vendor-app
        run: npx eslint src/ --max-warnings=20

      - name: Run Jest tests
        working-directory: local-vendor-app
        run: npm test -- --passWithNoTests

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./local-vendor-app
          dockerfile: ./local-vendor-app/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/localsphere-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./localsphere-v3
          dockerfile: ./localsphere-v3/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/localsphere-frontend:latest