name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run PyUnit Tests
        working-directory: local-vendor-app
        run: python test_app.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and push vendor backend
        uses: docker/build-push-action@v5
        with:
          context: ./local-vendor-app
          push: true
          tags: shruti3505/local-vendor-app:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./localsphere-v3
          push: true
          tags: shruti3505/localsphere-v3:latest