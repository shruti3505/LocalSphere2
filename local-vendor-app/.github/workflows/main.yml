name: LocalSphere CI/CD

on:
  push:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install & Test Backend
        run: |
          cd local-vendor-app
          npm install
          npm test

      - name: Install & Test Frontend
        run: |
          cd localsphere-v3
          npm install
          npm test

      - name: Verify Docker Build
        run: |
          docker build -t local-test-backend ./local-vendor-app
          docker build -t local-test-frontend ./localsphere-v3